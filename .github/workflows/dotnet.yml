name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  pipeline:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Cyber-behaviour-profiling.sln

      - name: SCA (vulnerable packages)
        run: dotnet list package --vulnerable --include-transitive 2>&1 | Tee-Object -FilePath sca.log
        continue-on-error: true

      - name: Lint
        run: dotnet format Cyber-behaviour-profiling.sln --verify-no-changes 2>&1 | Tee-Object -FilePath lint.log
        continue-on-error: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Build
        run: dotnet build Cyber-behaviour-profiling.sln --no-restore --configuration Release 2>&1 | Tee-Object -FilePath build.log

      - name: Analyze (CodeQL)
        uses: github/codeql-action/analyze@v3

      - name: Test
        run: >
          dotnet test Cyber-behaviour-profiling.sln
          --no-build
          --configuration Release
          --verbosity normal
          --logger "trx;LogFileName=results.trx"
          2>&1 | Tee-Object -FilePath test.log

      - name: Publish (staging)
        run: >
          dotnet publish Cyber-behaviour-profiling.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          --output staging/

      - name: Upload staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberProfiler-${{ github.sha }}
          path: staging/
          retention-days: 14

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.sha }}
          path: |
            *.log
            **/*.trx
          retention-days: 7
